<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Item Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <h1 class="app-title">Task Manager</h1>
            <p class="app-subtitle">Build, test, and conquer.</p>
        </header>

        <section class="todo-form-container">
            <form id="add-todo-form" class="todo-form">
                <div class="input-group">
                    <input type="text" id="new-todo-title" placeholder="What needs to be done?" required aria-label="New task title">
                    <input type="datetime-local" id="new-todo-date" required aria-label="Due date and time">
                </div>
                <textarea id="new-todo-description" placeholder="Task description (optional)..." aria-label="New task description"></textarea>
                <button type="submit" class="add-button" aria-label="Add Task">Add Task</button>
            </form>
        </section>

        <div id="todo-list">
            <article class="todo-card" data-testid="test-todo-card">
            <header class="todo-header">
                <div class="todo-status-group">
                    <span class="status-badge" data-testid="test-todo-status">In Progress</span>
                    <span class="priority-badge priority-high" data-testid="test-todo-priority" aria-label="High Priority">High</span>
                </div>
                <div class="todo-actions">
                    <button class="icon-button" data-testid="test-todo-edit-button" aria-label="Edit Task">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                    <button class="icon-button delete" data-testid="test-todo-delete-button" aria-label="Delete Task">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
            </header>

            <div class="todo-content">
                <div class="todo-toggle-container">
                    <input type="checkbox" id="todo-complete" data-testid="test-todo-complete-toggle" class="todo-checkbox">
                    <label for="todo-complete" class="todo-label">
                        <h2 class="todo-title" data-testid="test-todo-title">Frontend Wizard Certification</h2>
                    </label>
                </div>
                <p class="todo-description" data-testid="test-todo-description">Complete the Stage 0 task by building a testable, accessible, and ultra-premium Todo Item Card components.</p>
            </div>

            <footer class="todo-footer">
                <div class="todo-meta">
                    <div class="todo-date-box">
                        <time class="todo-due-date" data-testid="test-todo-due-date" datetime="2026-04-15T18:00:00Z">Due Apr 15, 2026</time>
                        <span class="todo-time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Loading remaining time...</span>
                    </div>
                    <ul class="todo-tags" data-testid="test-todo-tags" role="list">
                        <li class="tag" data-testid="test-todo-tag-work">Work</li>
                        <li class="tag urgent" data-testid="test-todo-tag-urgent">Urgent</li>
                    </ul>
                </div>
            </footer>
        </article>
    </div>
</main>

    <script src="script.js?v=2"></script>
</body>
</html>
